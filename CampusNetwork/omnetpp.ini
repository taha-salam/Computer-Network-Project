[General]
network = CampusNetwork
sim-time-limit = 180s
record-eventlog = false
debug-on-errors = false
**.vector-recording = false
**.scalar-recording = true

# ====================== Link Failure via ScenarioManager ======================
# SE-to-Core backbone link disabled at t=60s, restored at t=120s.
# Tests each protocol's failure detection and reconvergence behavior.
*.scenarioManager.script = xml("<script><at t='60.0'><set-channel-param src-module='coreRouter' src-gate='ethg$o[0]' par='disabled' value='true'/><set-channel-param src-module='seRouter' src-gate='ethg$o[0]' par='disabled' value='true'/></at><at t='120.0'><set-channel-param src-module='coreRouter' src-gate='ethg$o[0]' par='disabled' value='false'/><set-channel-param src-module='seRouter' src-gate='ethg$o[0]' par='disabled' value='false'/></at></script>")

# ====================== Traffic Generator (shared across all scenarios) ======================
**.seHost*.app[0].typename    = "TrafficGenerator"
**.eeHost*.app[0].typename    = "TrafficGenerator"
**.bbaHost*.app[0].typename   = "TrafficGenerator"
**.adminHost*.app[0].typename = "TrafficGenerator"

# appServer uses UdpSink to receive and record incoming packets
*.appServer.app[0].typename  = "UdpSink"
*.appServer.app[0].localPort = 1234

# CBR traffic profile parameters - same across all scenarios for fair comparison
**.app[0].trafficProfile = "CBR"
**.app[0].destAddress    = "10.0.6.1"   # appServer IP
**.app[0].destPort       = 1234
**.app[0].startTime      = 1s
**.app[0].stopTime       = 175s
**.app[0].packetSize     = 512
**.app[0].sendInterval   = 0.05s

# ====================== STATIC ======================
[Config Static]
description = "Static Routing"
extends = General

*.coreRouter.typename  = "StaticRouter"
*.seRouter.typename    = "StaticRouter"
*.eeRouter.typename    = "StaticRouter"
*.bbaRouter.typename   = "StaticRouter"
*.adminRouter.typename = "StaticRouter"

# Number of Ethernet ports per router
*.coreRouter.numPorts  = 6   # 4 dept routers + DNS server + app server
*.seRouter.numPorts    = 4   # 1 uplink to core + 3 hosts
*.eeRouter.numPorts    = 4
*.bbaRouter.numPorts   = 4
*.adminRouter.numPorts = 4

# Router IP addresses (used for identification/logging only)
*.coreRouter.ipAddress  = "10.0.10.1"
*.seRouter.ipAddress    = "10.0.10.2"
*.eeRouter.ipAddress    = "10.0.10.6"
*.bbaRouter.ipAddress   = "10.0.10.10"
*.adminRouter.ipAddress = "10.0.10.14"

# Static forwarding tables: format is destNetwork/subnetMask:outPort
# coreRouter: port 0=SE, 1=EE, 2=BBA, 3=Admin, 4=DNS, 5=appServer
*.coreRouter.routeTable  = "10.0.1.0/255.255.255.0:0;10.0.2.0/255.255.255.0:1;10.0.3.0/255.255.255.0:2;10.0.4.0/255.255.255.0:3;10.0.6.0/255.255.255.0:5"
# Department routers: port 0 = uplink to core; default route catches all other traffic
*.seRouter.routeTable    = "0.0.0.0/0.0.0.0:0;10.0.6.0/255.255.255.0:0"
*.eeRouter.routeTable    = "0.0.0.0/0.0.0.0:0;10.0.6.0/255.255.255.0:0"
*.bbaRouter.routeTable   = "0.0.0.0/0.0.0.0:0;10.0.6.0/255.255.255.0:0"
*.adminRouter.routeTable = "0.0.0.0/0.0.0.0:0;10.0.6.0/255.255.255.0:0"

# ====================== RIP ======================
[Config RIP]
# CONFIG_ID: RIP_CNET26_SE
description = "RIP Routing"
extends = General

# Disable static route pre-installation so RIP performs all routing decisions.
# Without this the configurator pre-populates routes and RIP is bypassed entirely.
*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

# Enable INET's built-in RIP module on all routers
*.coreRouter.hasRip  = true
*.seRouter.hasRip    = true
*.eeRouter.hasRip    = true
*.bbaRouter.hasRip   = true
*.adminRouter.hasRip = true

# RIP Update Interval: 30s (RFC 1058 standard value)
# Each router broadcasts its full routing table to neighbors every 30s.
# Shorter intervals converge faster but increase control traffic overhead.
*.*.rip.updateInterval = 30s

# RIP Route Expiry Time: 180s
# If no update is received for a route within this window it is marked invalid
# (metric set to 16 = infinity). Set to RFC 1058 default of 6x update interval.
*.*.rip.routeExpiryTime = 180s

# RIP Route Purge Time: 120s
# After a route is marked invalid it remains in the table for this duration
# before permanent removal (garbage collection). RFC 1058 default value.
*.*.rip.routePurgeTime = 120s

# Split Horizon: prevents routing loops by not advertising a route back to
# the neighbor it was learned from. Chosen over PoisonReverse to reduce
# the volume of update traffic during normal steady-state operation.
*.*.rip.splitHorizonMode = "SplitHorizon"

# Result recording for RIP analysis
**.rip.updatesSent.record     = true
**.rip.updatesReceived.record = true
**.pktsSent.record            = true
**.pktsReceived.record        = true
**.endToEndDelay.record       = true

# ====================== OSPF ======================
[Config OSPF]
# CONFIG_ID: OSPF_CNET26_SE
description = "OSPF Routing"
extends = General

# Disable static route pre-installation so OSPF performs all routing decisions.
# Without this the configurator pre-populates routes and OSPF is bypassed entirely.
*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

# Enable INET's built-in OSPF module on all routers
*.coreRouter.hasOspf  = true
*.seRouter.hasOspf    = true
*.eeRouter.hasOspf    = true
*.bbaRouter.hasOspf   = true
*.adminRouter.hasOspf = true

# Place all routers in Area 0 (OSPF backbone area).
# Single-area design: all routers share one link-state database and each
# independently runs Dijkstra to compute optimal paths to every destination.
*.*.ospf.areas[0].areaID = "0.0.0.0"

# Hello Interval: 10s
# How often each router sends Hello packets to discover and maintain neighbor
# adjacencies. Shorter = faster failure detection but more control overhead.
# 10s chosen as a balance between responsiveness and bandwidth usage.
*.*.ospf.helloInterval = 10s

# Dead Interval: 40s (4x Hello interval - standard RFC 2328 ratio)
# If no Hello is received from a neighbor within this time, that neighbor is
# declared dead and its LSAs are removed from the link-state database.
*.*.ospf.deadInterval = 40s

# Link costs reflect physical bandwidth (lower cost = preferred path):
# Backbone links at 100Mbps get cost 1 (high bandwidth, preferred for transit)
# Access links at 10Mbps get cost 10 (lower bandwidth, host access only)
*.coreRouter.ospf.areas[0].interfaces[*].interfaceOutputCost  = 1
*.seRouter.ospf.areas[0].interfaces[*].interfaceOutputCost    = 10
*.eeRouter.ospf.areas[0].interfaces[*].interfaceOutputCost    = 10
*.bbaRouter.ospf.areas[0].interfaces[*].interfaceOutputCost   = 10
*.adminRouter.ospf.areas[0].interfaces[*].interfaceOutputCost = 10

# Result recording for OSPF analysis
**.ospf.lsaCount.record  = true
**.pktsSent.record       = true
**.pktsReceived.record   = true
**.endToEndDelay.record  = true