[General]
network = CampusNetwork
sim-time-limit = 180s
record-eventlog = true

# ------------------------------------
# Static Routing Scenario
# ------------------------------------
[Config Static]
description = "Static Routing Simulation"

# Traffic Generator settings for all hosts - CBR profile
**.seHost1.app[0].typename = "TrafficGenerator"
**.seHost2.app[0].typename = "TrafficGenerator"
**.seHost3.app[0].typename = "TrafficGenerator"
**.eeHost1.app[0].typename = "TrafficGenerator"
**.eeHost2.app[0].typename = "TrafficGenerator"
**.eeHost3.app[0].typename = "TrafficGenerator"
**.bbaHost1.app[0].typename = "TrafficGenerator"
**.bbaHost2.app[0].typename = "TrafficGenerator"
**.bbaHost3.app[0].typename = "TrafficGenerator"
**.adminHost1.app[0].typename = "TrafficGenerator"
**.adminHost2.app[0].typename = "TrafficGenerator"
**.adminHost3.app[0].typename = "TrafficGenerator"

# CBR Profile parameters
**.app[0].trafficProfile = "CBR"
**.app[0].packetSize = 512
**.app[0].sendInterval = 0.01
**.app[0].startTime = 1.0
**.app[0].stopTime = 175.0
**.app[0].destAddress = "10.0.6.1"  # appServer IP

# Bursty profile config (comment above and uncomment below to switch)
# **.app[0].trafficProfile = "Bursty"
# **.app[0].burstSize = 10
# **.app[0].burstGap = 1.0

# Static route tables for each router
# Format: destIP/mask:port;destIP/mask:port
**.coreRouter.routeTable = "10.0.1.0/255.255.255.0:0;10.0.2.0/255.255.255.0:1;10.0.3.0/255.255.255.0:2;10.0.4.0/255.255.255.0:3"
**.seRouter.routeTable = "10.0.0.0/255.0.0.0:0;10.0.1.1/255.255.255.255:1;10.0.1.2/255.255.255.255:2;10.0.1.3/255.255.255.255:3"
**.eeRouter.routeTable = "10.0.0.0/255.0.0.0:0;10.0.2.1/255.255.255.255:1;10.0.2.2/255.255.255.255:2;10.0.2.3/255.255.255.255:3"
**.bbaRouter.routeTable = "10.0.0.0/255.0.0.0:0;10.0.3.1/255.255.255.255:1;10.0.3.2/255.255.255.255:2;10.0.3.3/255.255.255.255:3"
**.adminRouter.routeTable = "10.0.0.0/255.0.0.0:0;10.0.4.1/255.255.255.255:1;10.0.4.2/255.255.255.255:2;10.0.4.3/255.255.255.255:3"

# Link failure: disable SE-Core link at t=60s, re-enable at t=120s
*.coreRouter.ethg[0].channel.disabled = false
*.seRouter.ethg[0].channel.disabled = false

# Result recording
**.pktsForwarded.record = true
**.pktsDropped.record = true
**.pktsSent.record = true

# ------------------------------------
# RIP Scenario (for Member 2)
# ------------------------------------
[Config RIP]
# CONFIG_ID: RIP_CNET26_SE
description = "RIP Simulation"
# Member 2 will fill this in

# ------------------------------------
# OSPF Scenario (for Member 3)
# ------------------------------------
[Config OSPF]
# CONFIG_ID: OSPF_CNET26_SE
description = "OSPF Simulation"
# Member 3 will fill this in