[General]
network = CampusNetwork
sim-time-limit = 180s
record-eventlog = false
debug-on-errors = false
**.vector-recording = false
**.scalar-recording = true

# IP config inline - /30 on every link so no subnet conflicts
*.configurator.typename = "Ipv4NetworkConfigurator"
*.configurator.config = xml("<config> \
    <interface hosts='coreRouter' towards='seRouter'    address='10.0.10.1'  netmask='255.255.255.252'/> \
    <interface hosts='seRouter'   towards='coreRouter'  address='10.0.10.2'  netmask='255.255.255.252'/> \
    <interface hosts='coreRouter' towards='eeRouter'    address='10.0.10.5'  netmask='255.255.255.252'/> \
    <interface hosts='eeRouter'   towards='coreRouter'  address='10.0.10.6'  netmask='255.255.255.252'/> \
    <interface hosts='coreRouter' towards='bbaRouter'   address='10.0.10.9'  netmask='255.255.255.252'/> \
    <interface hosts='bbaRouter'  towards='coreRouter'  address='10.0.10.10' netmask='255.255.255.252'/> \
    <interface hosts='coreRouter' towards='adminRouter' address='10.0.10.13' netmask='255.255.255.252'/> \
    <interface hosts='adminRouter' towards='coreRouter' address='10.0.10.14' netmask='255.255.255.252'/> \
    <interface hosts='coreRouter' towards='dnsServer'   address='10.0.10.17' netmask='255.255.255.252'/> \
    <interface hosts='dnsServer'  towards='coreRouter'  address='10.0.10.18' netmask='255.255.255.252'/> \
    <interface hosts='coreRouter' towards='appServer'   address='10.0.10.21' netmask='255.255.255.252'/> \
    <interface hosts='appServer'  towards='coreRouter'  address='10.0.10.22' netmask='255.255.255.252'/> \
    <interface hosts='seRouter' towards='seHost1' address='10.0.1.1' netmask='255.255.255.252'/> \
    <interface hosts='seHost1'  towards='seRouter' address='10.0.1.2' netmask='255.255.255.252'/> \
    <interface hosts='seRouter' towards='seHost2' address='10.0.1.5' netmask='255.255.255.252'/> \
    <interface hosts='seHost2'  towards='seRouter' address='10.0.1.6' netmask='255.255.255.252'/> \
    <interface hosts='seRouter' towards='seHost3' address='10.0.1.9' netmask='255.255.255.252'/> \
    <interface hosts='seHost3'  towards='seRouter' address='10.0.1.10' netmask='255.255.255.252'/> \
    <interface hosts='eeRouter' towards='eeHost1' address='10.0.2.1' netmask='255.255.255.252'/> \
    <interface hosts='eeHost1'  towards='eeRouter' address='10.0.2.2' netmask='255.255.255.252'/> \
    <interface hosts='eeRouter' towards='eeHost2' address='10.0.2.5' netmask='255.255.255.252'/> \
    <interface hosts='eeHost2'  towards='eeRouter' address='10.0.2.6' netmask='255.255.255.252'/> \
    <interface hosts='eeRouter' towards='eeHost3' address='10.0.2.9' netmask='255.255.255.252'/> \
    <interface hosts='eeHost3'  towards='eeRouter' address='10.0.2.10' netmask='255.255.255.252'/> \
    <interface hosts='bbaRouter' towards='bbaHost1' address='10.0.3.1' netmask='255.255.255.252'/> \
    <interface hosts='bbaHost1'  towards='bbaRouter' address='10.0.3.2' netmask='255.255.255.252'/> \
    <interface hosts='bbaRouter' towards='bbaHost2' address='10.0.3.5' netmask='255.255.255.252'/> \
    <interface hosts='bbaHost2'  towards='bbaRouter' address='10.0.3.6' netmask='255.255.255.252'/> \
    <interface hosts='bbaRouter' towards='bbaHost3' address='10.0.3.9' netmask='255.255.255.252'/> \
    <interface hosts='bbaHost3'  towards='bbaRouter' address='10.0.3.10' netmask='255.255.255.252'/> \
    <interface hosts='adminRouter' towards='adminHost1' address='10.0.4.1' netmask='255.255.255.252'/> \
    <interface hosts='adminHost1'  towards='adminRouter' address='10.0.4.2' netmask='255.255.255.252'/> \
    <interface hosts='adminRouter' towards='adminHost2' address='10.0.4.5' netmask='255.255.255.252'/> \
    <interface hosts='adminHost2'  towards='adminRouter' address='10.0.4.6' netmask='255.255.255.252'/> \
    <interface hosts='adminRouter' towards='adminHost3' address='10.0.4.9' netmask='255.255.255.252'/> \
    <interface hosts='adminHost3'  towards='adminRouter' address='10.0.4.10' netmask='255.255.255.252'/> \
    <route hosts='seHost1 seHost2 seHost3'       destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.1.1'/> \
    <route hosts='eeHost1 eeHost2 eeHost3'       destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.2.1'/> \
    <route hosts='bbaHost1 bbaHost2 bbaHost3'    destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.3.1'/> \
    <route hosts='adminHost1 adminHost2 adminHost3' destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.4.1'/> \
    <route hosts='appServer'                     destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.10.21'/> \
    <route hosts='dnsServer'                     destination='0.0.0.0' netmask='0.0.0.0' gateway='10.0.10.17'/> \
</config>")

# Link Failure: SE-Core link down at t=60s, restored at t=120s
*.scenarioManager.script = xml("<script><at t='60.0'><set-channel-param src-module='coreRouter' src-gate='ethg$o[0]' par='disabled' value='true'/><set-channel-param src-module='seRouter' src-gate='ethg$o[0]' par='disabled' value='true'/></at><at t='120.0'><set-channel-param src-module='coreRouter' src-gate='ethg$o[0]' par='disabled' value='false'/><set-channel-param src-module='seRouter' src-gate='ethg$o[0]' par='disabled' value='false'/></at></script>")

# Traffic Generator on all hosts
**.seHost*.app[0].typename    = "TrafficGenerator"
**.eeHost*.app[0].typename    = "TrafficGenerator"
**.bbaHost*.app[0].typename   = "TrafficGenerator"
**.adminHost*.app[0].typename = "TrafficGenerator"

# appServer receives with UdpSink
*.appServer.app[0].typename  = "UdpSink"
*.appServer.app[0].localPort = 5000

# CBR traffic to appServer (IP = 10.0.10.22)
**.app[0].trafficProfile = "CBR"
**.app[0].destAddress    = "10.0.10.22"
**.app[0].destPort       = 5000
**.app[0].localPort      = 5000
**.app[0].startTime      = 5s
**.app[0].stopTime       = 175s
**.app[0].packetSize     = 512
**.app[0].sendInterval   = 0.05s
**.app[0].burstSize      = 10
**.app[0].burstGap       = 1.0s

# ====================== STATIC ======================
[Config Static]
description = "Static Routing"
extends = General

*.coreRouter.typename  = "StaticRouter"
*.seRouter.typename    = "StaticRouter"
*.eeRouter.typename    = "StaticRouter"
*.bbaRouter.typename   = "StaticRouter"
*.adminRouter.typename = "StaticRouter"

*.coreRouter.numPorts  = 6
*.seRouter.numPorts    = 4
*.eeRouter.numPorts    = 4
*.bbaRouter.numPorts   = 4
*.adminRouter.numPorts = 4

*.coreRouter.ipAddress  = "10.0.10.1"
*.seRouter.ipAddress    = "10.0.10.2"
*.eeRouter.ipAddress    = "10.0.10.6"
*.bbaRouter.ipAddress   = "10.0.10.10"
*.adminRouter.ipAddress = "10.0.10.14"

# coreRouter ports: 0=seRouter,1=eeRouter,2=bbaRouter,3=adminRouter,4=dnsServer,5=appServer
*.coreRouter.routeTable  = "10.0.1.0/255.255.255.0:0;10.0.2.0/255.255.255.0:1;10.0.3.0/255.255.255.0:2;10.0.4.0/255.255.255.0:3;10.0.10.20/255.255.255.252:5"
*.seRouter.routeTable    = "0.0.0.0/0.0.0.0:0"
*.eeRouter.routeTable    = "0.0.0.0/0.0.0.0:0"
*.bbaRouter.routeTable   = "0.0.0.0/0.0.0.0:0"
*.adminRouter.routeTable = "0.0.0.0/0.0.0.0:0"

# ====================== RIP ======================
[Config RIP]
# CONFIG_ID: RIP_CNET26_SE
description = "RIP Routing"
extends = General

# Hosts have static default routes (set in xml above).
# Disable static routes ONLY on routers so RIP handles inter-router routing.
*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.coreRouter.hasRip  = true
*.seRouter.hasRip    = true
*.eeRouter.hasRip    = true
*.bbaRouter.hasRip   = true
*.adminRouter.hasRip = true

*.*.rip.updateInterval   = 30s
*.*.rip.routeExpiryTime  = 180s
*.*.rip.routePurgeTime   = 120s
*.*.rip.splitHorizonMode = "SplitHorizon"

**.rip.updatesSent.record     = true
**.rip.updatesReceived.record = true
**.pktsSent.record            = true
**.pktsReceived.record        = true
**.endToEndDelay.record       = true

# ====================== OSPF ======================
[Config OSPF]
# CONFIG_ID: OSPF_CNET26_SE
description = "OSPF Routing"
extends = General

# Let configurator install connected routes; OSPF adds dynamic routing on top
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true

*.coreRouter.hasOspf  = true
*.seRouter.hasOspf    = true
*.eeRouter.hasOspf    = true
*.bbaRouter.hasOspf   = true
*.adminRouter.hasOspf = true

*.*.ospf.areas[0].areaID = "0.0.0.0"
*.*.ospf.helloInterval   = 2s
*.*.ospf.deadInterval    = 8s

*.coreRouter.ospf.areas[0].interfaces[*].interfaceOutputCost  = 1
*.seRouter.ospf.areas[0].interfaces[*].interfaceOutputCost    = 10
*.eeRouter.ospf.areas[0].interfaces[*].interfaceOutputCost    = 10
*.bbaRouter.ospf.areas[0].interfaces[*].interfaceOutputCost   = 10
*.adminRouter.ospf.areas[0].interfaces[*].interfaceOutputCost = 10

**.app[0].startTime = 10s

**.ospf.lsaCount.record = true
**.pktsSent.record      = true
**.pktsReceived.record  = true
**.endToEndDelay.record = true